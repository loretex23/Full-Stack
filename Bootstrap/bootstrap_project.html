<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Document</title>
    
    <!-- 1. CORRECCIÓN: Actualizado a CSS de Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="colors.css" rel="stylesheet" type="text/css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand">Navbar</span>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <! Cards >
            <div class="col-md-8">
                <div class="row">
                    <div class="col-md-4">
                        <div class="card p-3">Card 1</div>
                    </div>
                    <div class="col-md-4">
                        <div class="card p-3">Card 2</div>
                    </div>
                    <div class="col-md-4">
                        <div class="card p-3">Card 3</div>
                    </div>
                    <div class="col-md-6 mt-3">
                        <div class="card p-3">Card 4</div>
                    </div>
                    <div class="col-md-6 mt-3">
                        <div class="card p-3">Card 5</div>
                    </div>
                </div>
            </div>

            <! Formulario  >
            <div class="col-md-4">
                <div class="card p-3">
                    <h5>Formulario</h5>
                    <input class="form-control mb-2" placeholder="Nombre">
                    <input class="form-control mb-2" placeholder="Email">
                    <button class="btn btn-primary">Enviar</button>
                </div>
            </div>
        </div>

        <! Carrusel >
        <div class="row mt-5">
            <div class="col-12"> 


                <div id="miCarousel" class="carousel slide carousel-dark" data-bs-ride="carousel">
                    <div class="carousel-inner">

                        <div class="carousel-item active">
                            <div class="card p-5 text-center bg-light">Slide 1</div>
                        </div>
                        <div class="carousel-item">
                            <div class="card p-5 text-center bg-light">Slide 2</div>
                        </div>
                        <div class="carousel-item">
                            <div class="card p-5 text-center bg-light">Slide 3</div>
                        </div>
                        <div class="carousel-item">
                            <div class="card p-5 text-center bg-light">Slide 4</div>
                        </div>
                        <div class="carousel-item">
                            <div class="card p-5 text-center bg-light">Slide 5</div>
                        </div>
                    </div>

                    <! Botones de Control >
                    <button class="carousel-control-prev" type="button" data-bs-target="#miCarousel" data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Anterior</span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#miCarousel" data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Siguiente</span>
                    </button>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
